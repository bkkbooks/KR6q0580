body:
  text: 侍者學正録住天龍山普德禪寺山門萬仞壁立慎終如始八字打開不勞彈指佛殿雲門要打丹霞便燒趙州絶聞看他從上古錐雖是剿絶為人爭奈翻成愛憎純上座則不然若欲建化門庭何妨互相恭敬展具便拜伽藍堂我無你不立你無我不成大家出隻手扶起破沙盆據室斬釘截鐵盤根錯節直逼生蛇化龍不教證龜成鱉上堂拈帖云者箇便是天龍大衆九溪檀越向不思議海中流出底一段真風將來流遍天下於中恐有未見未聞者煩維那宣過指法座云三世諸佛在此牽枝引蔓歷代祖師在此揚沙撒土新長老到來擬合徹底掀翻不留朕跡免使瞎驢趁隊怎奈值便時宜只得將錯就錯遂升拈香云此瓣香專為祝延聖壽萬歲萬歲萬萬歲此瓣香奉為諸王殿下臣統千秋并本省文武尊官高增祿位此瓣香自松巋花擘之後復經百城煙水遍歷諸方受盡屈辱喫盡艱辛今日歸來深棲密遁詎意法叔古源和尚不容推脫平將天龍半座勉逼人天衆前無可回避此是第一回拈出爇向爐中專申供養松巋堂上傳臨濟正宗三十四世上善下權先師老和尚用酬法乳之恩斂衣敷座維那白椎竟乃云若論觀第一義諦早是虛空裏掘洞好肉上剜瘡欺謾赤子誑惑閭閻自古自今名不得然不得且道一是甚麼觀是何物所以純上座終不為人眼裏添釘直得風行草偃水到渠成把斷要津不通凡聖千差坐斷有無不立直下令人人頭頂青天個個腳踏實地無向無背無缺無餘到者裏三搭不回底由是自負挨著便轉又是平地喫交正恁麼時還知天龍為人落處麼良久曰四海浪平龍睡穩九天雲淨鶴飛高復舉三聖道我逢人則出出則不為人興化道我逢人則不出出則便為人師云二犬老名喧宇宙道重古今因甚麼一個藏頭露尾一個露尾藏頭引得後代兒孫個個鑽龜打瓦據今論量好各與三十柱杖何故天龍門下令不虛行上堂世尊住世為一大事因緣也似小兒患天弔達磨西來直指人心見性成佛猶將丹紫畫連城所以惹得狸奴白牯抱屈生嗔露柱燈籠含冤冷笑且道他笑個甚麼人人手持足運個個鼻直眼橫寒時著衣饑時喫飯折旋俯仰運用施為一一天真一一明妙更說甚麼三七思惟久默斯要咄千峰勢到嶽邊止萬派聲歸海上消臘八日上堂僧問霜寒露冷月白風清正當是時釋迦成道即不問明星現處作麼生師云有眼皆見進云見後如何師云打失鼻孔進云謝師答話師云也是承虛接響乃云霜寒露冷月白風清正當是時雪山午夜一天星盡大地衆生同見同明同證如來智慧德相更說甚麼妄想執著所隔不能得證釋迦老子無端特端妄區分誣陷平人脫賺後代兒孫個個錯認定盤星喝一喝下座上堂打梆出坡打板過堂會則神通妙用不會則業識忙忙咄切莫壓良為賤卓杖一下云鳧脛短兮鶴脛長敘事上堂世尊住世五時說法近來諸方三日一小參五日一升座天龍這裏則不然半月半月一上堂既佛法本來不二因甚卻有兩般主張且道分別在甚麼處良久云多虛不如少實元旦上堂元正啓祚萬物維新普天匝地咸樂升平佛法二字猶是剩語那堪論有論無說新說舊敢問大衆且道新歲今來何處來舊歲昨去那裏去來去都是錯商量怎奈其中有道理甚麼道理一年三百六十日日日日從東畔起是則是卓杖一下云逢人不得錯舉即事上堂佛殿揦橫卓山門八字開來者秪解於中禮拜孰能照顧頭上有棟梁材豎拂子云若向者裏覷得著底山僧把他頭上頂戴雖然如是黃河三千年一度清喝一喝下座元宵上堂天上月光人間燈光光光相照地久天長在在敲鑼擂鼓處處音樂鏗鏘村歌社舞樂無說甚人間天上文殊普賢橫眠柳巷花街觀音彌勒倒臥酒肆淫房正恁麼時今佛放光明助發實相義則且置秪如張公喫酒李公醉諸人又作麼生商量喝一喝下座因法兄天一和尚專人送法衣法帔至上堂冬令春行遲太早因緣逆順總無拘大庾嶺頭陳公案直至而今拈弄奇且道奇個甚麼拈起衣云人人盡道提不起底因甚今日又在天龍手裏指法帔云更有者個覿面難瞞卷舒由己若向者裏著得一隻眼自然奇特上不妨奇特殊勝中更加殊勝然後掀翻海嶽撥轉乾坤攪長河為酥酪變大地作黃金不為分外其或未能莫將閒學解埋沒祖師心喝一喝下座聖節上堂拈香云即此者箇祝延今上皇帝聖躬萬歲萬歲萬萬歲壽山福海聳翠彌深堯風並慈風浩蕩舜日與佛日常明所以八方歌有道四海樂無為秪如林下衲子報恩一句又作麼生良久曰恩深轉無語懷抱自分明擊拂子下座上堂春日熙熙和風習習岸柳搖金溪桃吐赤突出威音那畔揭示衲僧巴鼻明歷歷親的的因甚惟道江南三月鷓鴣啼天龍門下打折驢脊示衆上堂第一義諦諸方道鍾未響鼓未鳴未出方丈已前分付了也若恁麼未免誤賺捕風捉影之流向黑山鬼窟裏作活計去在殊不知鐘鼓交加人天普集一句當天十方通暢塵塵剎剎無處不明法法頭頭何所不現如天普蓋似地普擎直教人人共見個個同明物我輝融古今一致不落見聞全彰體用所以道人人有個無位真人常在面門出入未證據者看看到者裏還回避得也無若也回避得三世諸佛歷代祖師並天下老和尚一齊入地獄如箭射既回避不得敢問諸人第一義諦作麼生觀觀即不無爭奈落在第二頭上堂大盡三十日小盡二十九三世諸佛不知有黧奴白牯卻知有且道知個甚麼雲中木馬嘶海底泥牛吼驚起夜叉神𨁝跳上岸瞪眉努目一一面南看北斗上堂天高地厚山尖水平日出月落夜暗晝明龍吟霧起虎嘯風生鴉鳴鵲噪鳶飛雲騰盡是當人不動境界於中是凡是聖是男是女是俗是僧乃至四生六道情與無情卓拄杖一下云總在者裏一切智智清清無二無二分無別無斷故更說甚麼靈山拈花少室安心檢點將來也是眼裏著釘上堂父母未生前神頭鬼面狗子無佛性膏肓大病萬法歸一參天荊棘一歸何處轉入邪路踏破牢關解轉身大夢胡為尚未惺三生六十劫總是可憐生何故聻卓拄杖一下云野老不知堯舜力鼕鼕打鼓祭江神上堂隔山見煙知是火隔牆見角知是牛那吒太子析骨還父析肉還母因甚麼演若達多認影迷頭可謂無限風光無限意幾多歡喜幾多愁喝一喝云還會麼喜底一任喜愁底一任愁五湖煙景有誰爭夕陽西去水東流中秋上堂寶月放光丹桂飄香兩彩一賽鼻孔昂藏正恁麼時直饒道好修行好供養禪歸海經歸藏總好喫龍山痛棒何以分明有月落波心自是無雲生嶺上喝一喝下座臘八日上堂天是天地是地日月是日月星辰是星辰山川是山川草木是草木人是人物是物所以道是法住法位世間相常住釋迦老子是皇宮太子無端向雪山六年苦行夜睹明星喚作悟道成佛喝一喝云白玉本無瑕甘自遭塗汙雖然如是不得春風花不開花開須借春風拂元旦上堂一年十二月一月三十日一日十二時年年是好年月月是好月日日是好日時時是好時因甚麼今日又喚作元旦所以道欲識佛性義但觀時節因緣時節若至其理自彰即今時節已至其理已彰佛性義作麼生商量靠拄杖云皇風浩蕩乾坤廓野老謳歌春晝長上堂我宗無語句亦無一法與人德山老漢背月影掩耳偷鈴殊不知山河大地草木叢林文殊普賢無處藏身牆壁瓦礫忠國師一生受用不盡立雪斷臂與安心眼裏無斤一世貧喝一喝下座上堂三千七百則爛葛藤誤賺後代兒孫偏知倒見五千四十八卷閒故紙纍及天下癡人造心殃於中還有知端的者麼卓拄杖云水向石邊流出冷風從花裏過來香上堂官不容針私通車馬卓拄杖一下云放開線道之乎也者若有把斷要津不通凡聖底來正好勘過了打何以如此杜鵑啼血染山花上堂禪禪禪饑來喫飯困來眠道道道城樓五鼓金雞叫除卻禪去卻道夜半日頭紅杲杲於此者裏知分曉夜明簾外轉身早是則是只是衲僧門下未免攔胸踏倒且道衲僧門下又有甚長處良久云了上堂春寒秋熱隆冬下雪梅花開放嶺頭路上行人欲歇不歇何故不歇眼觀東南意在西北殊不知饒你走遍天涯海角踏翻茶陵橋板豁然大悟天龍拄杖子緩緩向你道明月蘆花一樣看鷺鷥立雪非同色一喝上堂儱儱侗侗瞞瞞頇頇正是全體大用法法分明頭頭合轍未免遍地葛藤天龍只知饑來喫飯困來打眠夢升兜率猶未惺金雞啼唱五更天退院上堂動若行雲止猶谷神在在緑楊堪繫馬本無心於彼此寧有相於去來家家有路透長安只知來去不以相動靜不以心作麼生是退院一句卓杖云一月普現一切水一切水月一月攝住松巋山普光禪寺山門祖翁門戶八字打開一任鳳翥龍翔曳拄杖云從者裏入佛殿釋迦彌勒元無彼此覿面相逢齊之以禮展具便拜祖堂西天四七東土二三水流千派共出一源且道以何為驗插香云一片栴檀一縷煙據室者裏是先師奮獅子威野狐屏跡握吹毛劍斷衲僧命根底所在今日不肖到此別無長處只得據令而行卓拄杖便起上堂拈帖云正法流通無分二諦迭相扶持淵源有據且道其中事作麼生聽取維那剖露指法座云佛祖階級人天榜樣賣狗懸羊擔枷過狀新長老到此回避無門也只得納敗一上便升拈香祝聖畢再拈云此瓣香昔年於此山中薰鍛今日於此堂上拈出此是第二回熱向爐中專申供養本山堂上上善下權先師老和尚用酬法乳之恩白椎竟師拍禪床一下云三世諸佛歷代祖師並天下老和尚到者裏皆云提揭向上宗猷發明第一義諦殊不知遞相鈍置了也何故頭上是天腳下是地物物春生夏長人人眼橫鼻直一切本自見成那容節外生枝既然且道今日新長老入院升堂又為甚麼邊事若道為了先人未了公案猶是孤負先人若道顯揚古佛家風猶是孤負古佛若道揭示人天正眼猶是孤負人天正恁麼時總不與麼畢竟為甚麼邊事復拍一拍云從前汗馬無人識只要重論蓋代功喝一喝下座上堂良久云若向者裏倜儻得去直下纖塵不立截斷佛祖命根人人常光現前各各壁立萬仞縱橫挂寰中日月卷舒立方外乾坤更說甚麼聞聲悟道見色明心眼裏塵沙耳裏土誠哉實言倘或遲疑且須薦取葛藤以拂子打圓相云看看只者個原不從天降不從地生亦非空有在處稱尊乾坤無與比其大日月無與比其明虛空無與比其量滄海無與比其深不可思不可議不可量不可稱山川大地草木叢林森羅萬象情與無情總是渠堂奧中物亙古亙今無人敢侵千手大悲摸索不定摩醯正眼覿體難明所以三乘聞之膽喪十地聞之魂驚咦極是見成底事因甚得與麼尊貴與麼難親復良久云動著則禍生上堂禪非參究道絶功勳歷歷孤明本無缺剩六月炎天似火人人打扇乘涼臘月朔風如箭個個圍爐向火三月安居九旬禁足也是無端畫地為牢擔囊負鉢親師擇友自是斬頭覓活若是個純銅打就生鐵鑄成底管取春山花自開秋林葉自落正恁麼時金風吹玉管不是唱巴歌於中還有知音識調者麼良久擊拂子下座佛誕日沙彌披剃請上堂才出娘胎指天指地尊貴天然有本可據且道是甚麼本不見道未離兜率已降皇宮未出母胎度人已畢卓拄杖一下云出家沙彌直須向者裏會去曠劫無明當下冰消纍世業緣一時坐斷便可離塵脫俗剃髮披緇不離當處常湛然一超直入如來地復卓拄杖下座祈雨上堂饑則食渴則飲寒則衣理出自然福宜感過宜解事宜為豈有別焉所以道欲識佛性義當觀時節因緣時節若至其理自彰大衆且道即今是甚麼時節旱魃為虐失天地好生之德風狂日麗增萬物塗炭之殃遍界農人忍聲悲嘆山中野老蹙額沉吟林下道人豈無憂濟怎奈聚首無策驀拈拄杖云幸有者木上座臨機即應見義勇為所以不忍見聞直得挺身相救如何救翻身𨁝跳上三十三天築著帝釋鼻孔帝釋噴嚏一聲即時普天匝地油然作雲沛然下雨既然山僧亦得相助其力去也作麼生是相助底句卓一卓云急急如律令敕端節上堂無米包粽子客來沒款待蒿湯備禮儀大家同聚會隈隈摧摧壘壘堆堆但得一時和氣藹然赤日白舌自然遠遁他方雄符硃敕蒲劍艾虎總不消在何故家無白澤之圖必無如是妖怪上堂蛇無頭不行鳥無翅不飛拈起拄杖云看看喚作拄杖則觸不喚作拄杖則背直下承當了無向背如之若何甘受處分山僧若瞞諸人自墮拔舌犁耕是汝諸人還信得及麼卓一卓云劈開華嶽連天秀放出黃河徹底清上堂拈起拂子云即此用離此用檢點一場乾打開直下承當即下愚拋卻依然是狐種於中若有總不恁麼底病在膏肓不可醫畢竟如何即是擊案一下云吁上堂天地同根萬物一體正眼觀來豈有此理有物先天地無形本寂寥能為萬象主不逐四時凋卻較些子咄中秋上堂月圓月缺猶是幻中境界桂開桂卸無非世諦馨香於中有箇亙古亙今不開不卸無圓無缺底亦不可作奇特商量若作奇特商量腳跟下便與三十痛棒何故好肉上不許剜瘡上堂南泉斬貓歸宗斬蛇有例不可興無例不可缺咄仁者不憂智者不惑卓杖一下云珊瑚枝枝撐著月上堂歷歷明明古今不變撾鼓升堂全機展演坐立儼然相呈覿面卓杖下喝壓良為賤智者猶迷愚者取辨離智絶愚好看方便甚麼方便呵呵倒騎驢兮入佛殿冬至上堂陽極則生陰陰極則生陽秪如陰陽不相千處諸人又作麼生商量雖然時節不可不應只得冰河發焰寒谷生輝但不許書雲遮障那管他線短線長卓拄杖云晴空愛日挂當陽乾坤獨露堂堂臘八日上堂奇哉三嘆睹明星漏逗一場冤莫伸千古無人能雪釋瞎驢瞎馬趕成群即今還有為釋迦老子雪釋得底麼緩緩著是非已落傍人耳洗到驢年也不清上堂西來大意白雪陽春擬問如何打失眼睛諸人聞恁麼道未免避地裡商量也是白日眼著釘似則也似是則未能何故聻良久曰雪後始知松柏操事難方見丈夫心上堂靈山奧旨少室真機自天子以至於庶人一是皆以修身為本因甚麼百姓日用而不知何故不知拍膝一下云只為分明極返令所得遲元旦上堂說新又不新道舊亦非舊新舊兩無干冷灰重爆豆既是新舊無干因甚卻成冷灰爆豆莫不是本來無新舊由自強名模恁麼見解作他座主奴也未得在還分析得麼不萌枝上含春色鐵樹開花遍界香上堂呈橈並舞棹拋子大江心兩岸渡頭客灼然喫一驚看者看行者行風攪蘆花雪滿亭松巋恁麼告報大似當面熱瞞汝等諸人作麼生驀拈拄杖云看看三百餘會談不盡九年坐得骨頭疼靈利漢莫追尋五更清早起更有夜人行且道以何為證以拄杖畫一畫云魚躍淺塘花正發鳥歌深樹日初晴上堂一夜落花雨滿溪流水香祖師西來意端的沒商量何故沒商量卓拄杖一下云狀元本是天生定莫把馮京作馬涼上堂胡來胡現漢來漢現遂喝一喝云虛妄浮心多諸巧見作麼生是真實底句盞子撲落地碟子成七片佛誕日上堂四月八浴悉達香水分明似惡湯為報人人非眼瞎這些則且置秪如雲門大師到來敢問諸人作麼生角煞不角煞亂啼春鳥落藤花喝一喝下座上堂年年說月月說日日說時時說在在說處處說塵塵說剎剎說說無間歇諸人還會麼不見道烏石嶺與汝相見了也山門頭與汝相見了也僧堂前與汝相見了也還會麼癡人面前不得說夢度僧上堂本來圓潔何用剃披古人向佛殿前剷草看來也是鬼家活計拈起刀子云看看若是有智底男兒直須向者裏識得根源端的出家功德已畢豈待鬚髮落地其或未然山僧直得有條攀條無條攀例遂度刀云剃剃上堂東邊日出西邊曉水底魚兮山上鳥鼻祖西來端的意分明親切盡道了盡道了試問諸人曉不曉曉曉曉良哉觀世音全身入荒草上堂處處真處處真塵塵剎剎本來人者般說話唱教門中足可觀光衲僧門下未免白日見鬼且道衲僧門下又有甚長處良久曰衲被蒙頭萬事休此時山僧都不會端節上堂五月初五日自古是端陽人人皆知得不用更商量龍舟鬥水際百藥採山岡個事分明極直下好承當承當則且置秪如同時相應一句作麼生道熏風自南來殿閣生微涼上堂普化風顛搖鈴禾山賣弄打鼓丹霞寒燒木佛香嚴沒幹上樹將謂各逞風流孰知盡成敗露細以檢點將來爭似庭前露柱默默不動威嚴一任千人萬人到此只得覿面回互且道回互個甚麼咦不回互撞破腦門鮮血出上堂明明個事在當人叵耐當人自不親今日山僧沒伎倆拈來特地為區分且道分個甚麼盤江河木橋原秪用幾條鐵鍊關嶺馬跑井廟神乃是漢關將軍來往客人古今祈禱不盡於中求長壽得長壽求富饒得富饒求官位得官位求安穩得安穩失然有不得意者返怪神明籤不靈看來總是不知恩遂拍手呵呵大笑云還知麼松巋恁麼告報孟八郎漢又切莫錯認定盤星喝一喝下坐上堂一二三四五六七獻寶波斯樹上立七六五四三二一碧眼胡僧覷不及付與東村王大老笑倒西村石土地惹得胡張三黑李四二人冷地不甘直得眉毛廝結兩腳捎空走到松巋峰頂揚聲大叫曰長老不是不是山僧自恃徉不睬拄杖子忍俊不禁輕輕𨁝跳出來當頭一拶二人只得冰消瓦解疾走無邊然後拄杖子款款地道也大奇也大奇灼然有理不相欺不然總是錯認定盤星那能識得鉤頭意且道如何是鉤頭意卓拄杖云南山起雲北山下雨上堂若論者個事一一有來源甚麼來源天乾一定是荒年水旱也亦然直得晴雨兩相稱恰好是豐年所以道苦瓜連根苦甜瓜徹蒂甜還會麼擊拂子云穿破綾纙只是衣喫盡千般莫過鹽滋味本無別何用假言傳咦不言傳將謂壺中別有天上堂平施大用沒多般一句當陽仔細看直下了明無漸次回頭鐵馬更加鞭大衆既是直下了明無漸次因甚麼回頭鐵馬又更加鞭良久云棒打石人頭血出知音定不等閒看本師善權和尚忌拈香云觸不得背不得橫按莫邪活捉賊觸也得背也得直下證龜翻成鱉松巋不是揚家醜分明有話當人說且道說個甚麼今日先師忌辰設供上香禮拜上堂千千有個頭萬萬有個尾有頭有尾花開碓嘴無頭無尾是何神鬼三世諸佛弄鬼歷代祖師弄鬼古今天下老和尚弄鬼盡十方湖海衲子總在鬼窟裏作活計松巋今日路見不平且要向鬼神莫測處施大機顯大用與諸人通個消息還委悉麼良久云又添得一個上堂直切相為那許如何若何但來問者劈脊便棒隨聲便喝諸人若作棒喝商量自是白雲萬里覿面千山直饒不作棒喝商量亦未免驢前馬後還委悉麼良久曰一陳風來一陳寒冷地誰人著眼看幢老和尚忌拈香云有利則有害有成則有敗三方及四維上下並內外不是臨濟三玄亦非洞山五位牛頭栴檀莫比兜樓沉水豈賽今日落在愚孫手裏又且如何施設插香云等閒觸碎師翁鼻兒孫一代強一代上堂四方無壁落八面亦無門橫身當宇宙充塞滿乾坤進一步踢倒百億最勝須彌盧退一步踏翻無量無邊世界海秪如不進不退三世諸佛歷代祖師並天下老和尚一齊乞命正恁麼時汝等諸人又向甚麼處轉身若也轉得身吐得氣不妨把手共行其或未能山僧有條通天活路布施諸人去也擲拄杖下座元宵上堂日月燈明佛互相為晝夜亙古不相違此夜最親切最親切年年正月半便是元宵節壁上挂燈籠空中懸寶月嘉州大象趁光明陝府鐵牛生歡悅休歡悅看來也是證龜成鱉上堂釋迦老子為一大事因緣出現於世四十九年三百餘會鼓兩片皮橫說豎說為之度生達磨大師十萬里航海而來少室堆堆冷坐為之求人由是賺他斷臂安心腰石舂米九上三登不落因果墮五百生野狐不昧因果脫野狐身呵呵雲在嶺頭閒不徹水流澗底太茫生喝一喝下座應請退院上堂說進說退無端妄分彼此若也進退兩忘自然打成一片所以道盡乾坤大地是個院子溪山雲月為知己更嫌何地不風流拄杖橫肩得自由秪如卻允人情應時及節一句作麼生道千江有水千江月萬里無雲萬里天信官龍元敘比丘體若天眼天眉天璧觀止止莽悅莽玉嬋葉莽體莽妙峰海脈海藏悟極寂福寂性寂同海源無極海通學愚學正心智照瑩性德興悟興徹大見明印明戒寂文尼照悟武原陳子蘭書嘉興刊康熙癸未季秋穀旦板存嘉興楞嚴寺藏房
