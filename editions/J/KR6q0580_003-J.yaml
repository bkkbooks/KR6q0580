body:
  text: 侍者學正錄示眾示眾黃面瞿曇平空啟告六代祖師接響承虛古今天下老和尚總是隨邪逐惡不少是汝諸人亦向這裏妄想作麼殊不知據實而論要且三世諸佛歷代祖師也無開口處纔涉語言便是虛空裡釘橛直教如石含玉似地擎山風臨水面月映寒潭方有少許相應所以道真證不可以言傳妙契不可以意會到者裏自然花開春樹葉落秋林冰河浪暖寒爐發焰正當恁麼時且家堂穩密不落諸緣一句作麼生道苔封古殿人難到月鎖蒼梧鳳不棲示眾當陽一句截斷眾流克塞十虛了無向背諸佛諸祖出身無路天魔外道覷捕無門只得盡乾坤大地日月星辰森羅萬象情與無情蜎飛蝡動一切含靈同一體證同一受用同一圓明於中不見有纖毫生佛之相不見有纖毫凡聖之名不見有纖毫見聞之性不見有纖毫取捨之心不見有纖毫生滅之狀不見有纖毫動靜之形不見有纖毫得失過患不見有纖毫物我之分所以道天地同根萬物一體到者裏如擊石火閃電光會與不會纔是當人歷歷明明本自見成底事無欠無餘纖毫不昧秪因一念緣起不定逐境生情隨情轉念隨念分別有天有地有物有人有佛有祖有凡有聖有取有捨有見有聞有生有滅有動有靜於動靜中故起種種生滅於生滅中故有種種知解於知解中故有種種凡聖之論於凡聖中故有種種妄想執著於妄想執著中故有種種取捨於取捨中故有種種分別於分別中故有種種散亂於散亂中故有種種顛倒於顛倒中故成種種過患於過患中故使種種不安種種不和種種不寧種種不靜所以道萬法本閒惟人自鬧果實一念緣起無生自然當下脫體風流那有許多之謂到者裏若是個漢直教翻轉面皮掉轉腳手掀翻海嶽撥亂乾坤指南作北換斗移星等閒向淨白地上撒沙撒土立主立賓立照立用立境立人立玄立要立縱立奪立殺立活立收立放立賞立罰一切由己亦然道有生有佛也得有凡有聖也得有見有聞也得有取有捨也得有生有滅也得有動有靜也得又說甚麼得失過患物我分別所以道法不孤起仗境方生法隨法行法幢隨處建立者豈不是盡乾坤大地日月星辰森羅萬象情與無情同一體證同一受用同一圓明者哉者些且置更作麼生是當陽一句還會麼咄青天白日寐語作麼示眾趙州有個火爐頭無賓主底句諸人還會也無若也不會莫道不疑好若也會還須更解保任始得設若不解保任縱會無益到者裏饒你跳得金剛圈吞得栗棘蓬透得荊棘林過未免平地上自涉坑塹所以古人道死人路上有活人出身處活人路上死人無數靈利漢勿自欺瞞只怕臨末稍頭依舊胡攛亂撞豈不慎乎示眾大道無形真空絕跡會與不會總在裏許若也於中分緇素辨玄微論是非正是取螢火燒須彌若也總不恁麼切忌玉石同觀金沙混積所以道恁麼也不是不恁麼也不是恁麼不恁麼總不是到者裏直須別有向上一路始見衲僧巴鼻且如何是衲僧巴鼻烏龜鑽敗壁雞向五更啼示眾一句截流萬機寢削十方坐斷無去來今一道坦然渾無邊畔豁開正眼大地山河無寸土列回光相本來夜暗與日明自是清風生八極得來明月照乾坤到者裏塵塵剎剎全彰古佛家風法法頭頭總是當人機用還得麼果若得到恁麼田地達磨不來東土二祖不往西乾佛法流遍天下空生枉立巖前不然一片白雲橫谷口許多歸鳥盡迷巢喝一喝示眾若論此事別無奇特山僧有個方便不惜眉毛與你諸人下個註腳還委悉麼遂卓拄杖一下云者箇便是最初句良久云者箇便是向上句還有末後一句在你諸人肚皮餓了要飯喫處薦取於此薦得明信得及方知飯是米做鍋是鐵鑄若信不及正好向三家村口十字路頭把定待有人揵犁拗耙趕牛來時你便問他做甚麼事去他自向你道得親切若再不信直饒釋迦彌勒也奈你不何自是你無靈種要且怪別人不得設若信了山僧還有一句再向你道如何道毘婆尸佛早留心直至而今不得妙示眾剔起眉毛打起精神眼觀鼻鼻觀心咄將頭不猛誤殺三軍何故擊拂子云烏鴉不是墨染黑白鵝豈是粉裝成示眾愚者不及智者過之莫單單道是儒家語法華會上亦有五千退席所以釋迦老子道止止不須說我法妙難思還會麼秪如天龍恁麼告報也是妄分彼此機緣問祖意教意是同是別師云闍黎即今會底是甚麼意僧擬議師喝曰自家意尚不會問甚麼祖意教意僧問如何是祖師西來意師曰在甚麼處學者問頭來僧無對師曰黃連苦未是苦士問如何是松巋境師云山前一溪水山後萬株松士曰如何是境中人師云一任客來無管待柴門閒掩聽松風士曰恁麼則隨聲逐色去也師打云非汝境界士曰秪如人境不立時是何境界師云非但居士佛眼也覷不著士一喝師云亂叫作麼問僧甚處來僧曰湖廣來師云什麼物與麼來僧曰請和尚試分辯看師曰汝還承當得麼僧曰承當得師便打曰脫空謾語漢出去僧問趙州逢人總道喫茶去意旨如何師曰家常之事僧曰如何是家常之事師曰喫茶去僧參提起坐具曰展即是不展即是師曰汝行腳來多少時也僧擬議師曰進退不知是非不辨閻老子打算飯錢有日在僧愧禮拜師曰向後真實不為遲師問僧曰你何故擔個死屍到處浪走作麼僧曰豈干他事師曰他且置你作麼生僧曰我來禮拜和尚師曰禮我還自禮得麼僧無語師喝曰龍頭蛇尾漢出去師問僧甚處來僧曰來處來師便打曰衣飯錢且置草鞋錢作麼生還僧擬進語師復打曰閻老殿前喫鐵棒漢出去僧問上無攀仰下絕己躬時如何師曰途中漢僧擬議師便打僧問如何是祖師西來意師曰你出家多少時也僧曰十五年師曰出家十五年俗氣也不除師問一士曰我有一問問汝汝作麼生士曰老和尚莫多事師曰如何者樣著忙士無語師曰氣急殺人僧問過河須用筏到岸不須舟且如何是到岸底消息師曰有馬騎馬無馬步行拈古舉百丈野狐話拈云不落不昧兩個一對一墮一脫秦時𨍏轢天龍令行總教打向野狐窟裏永劫不容動著動著則禍生何故日午打三更舉麻谷持錫到章敬遶禪床三匝振錫一下卓然而立敬云是是雪竇云錯又到南泉亦遶三匝振一下卓然而立泉云不是不是雪竇云錯師云章敬道是也好與三十棒南泉道不是也好與三十棒雪竇道錯也好與三十棒今日設有到松巋如是而作未免劈脊便棒何故當斷必斷不招其亂頌古初生圓明妙體本無移七步周行把自欺獅子窟中獅子子鳳凰巢內鳳凰兒悟睹明星自古霜天月倍明誑言悟道睹明星從茲一點源頭濁流到驢年也不清拈花擢金白日非強手小見傍觀不放過不是當人爭勝負太平父子室操戈世尊陞座春色無高下花枝有短長文殊雖好手未免太郎當二祖安心只因未薦雪中寒愧乞安心把臂殘不但一身甘受屈兒孫代代被渠謾隻履西歸二塔鎮熊峰永不移誰云隻履復歸西宋雲自惑於蔥嶺慚愧無端舉世迷潦倒胡僧最沒情惑梁騙魏弄精神翩翩隻履西歸去惡水頻將潑後人達磨面壁坐久成勞將謂榜樣若遇英靈劈脊便棒殃崛產難相逢問對語郎當待得回言雪上霜不是東風能解凍焉知梅綻襲衣香靈雲見桃花大冶精金百鍊紅光明突出照無窮靈雲倏忽失前後誤把桃花認影中溈山水牯牛頭角崢嶸藏不得何須脅下更安排一生未了犁耙債又向山前鼓禍胎大隨烏龜陰陽怕懵懂太歲怕蠻人草鞋無忌諱烏龜背上行仰山勘香嚴誰謂香嚴會祖禪仰山早是自顢頇揚眉瞬目雖親切未免閻君算飯錢國師喚侍者八兩從來是半觔何須苦苦競頭分縱然不負嫡親子伎倆難教使出群兩堂首座齊喝二兩堂一喝震如雷百怪千妖當下灰獨有門前石獅子大開張口笑猶獃一聲霹靂震晴空特地漫天鼓黑風及至雲收煙雨散依然普照日輪紅三聖金鱗張郎賣貴李郎買賤兩個五百原是一貫善財參德雲二覷捕無門絕跡時德雲覿面不相欺若言七日別峰見特地重栽眼上眉德雲不在妙高峰七日逡巡枉用工直饒別峰親見得金烏未出海門東藥山久不陞座曙色未分人盡望及乎天曉也尋常明明日出乾坤露多少瞎驢錯度量德山托缽把纜放舟抱柱澡洗檢點將來德山父子德山入門便棒不動干戈定太平那容私令涉途程直教大地狼煙息倒捲黃河徹底清臨濟入門便喝二不善抽釘費氣力口開未免涉離微何如太用瞿曇老高踞摩竭靜掩扉一喝百川應倒流狂瀾息盡始方休龍歸大海波濤靜月上中天照九州即心即佛即心即佛馬頭安角異端蜂起無人斟酌非心非佛非心非佛龜背拔毛一人有慶萬國來朝九峰不肯首座高高山頂立深深海底行將軍不下馬各自有前程乾峰上堂舉一不得舉二云云草聖最為難龍蛇競筆端毫釐雖欲辦體勢更須完百丈再參馬祖父子相逢掣電機雙收雙放示全提無端一喝聾三日又是重添腦後鎚百丈野狐一對鴛鴦畫不成俄然翻墮野狐精古今不昧成狼籍說甚從前五百生郁山主乘驢跌悟遂有頌曰我有神珠一顆久被諸塵封鎖今朝塵盡光生照破山河萬朵忽然一跌明珠現塵盡光生萬象昭照破山河由自可莫教錯認馬鞍橋牛度窗櫺二鐵面冰心八鬧籃一鎚擊碎是非關堪憐無限邯鄲客盡把葫蘆作瓠搬牛度窗櫺尾過難致君天外出頭看東邊雷響西邊雨平地波濤淹翠巖瑞巖主人公二鷓鴣啼在深花裏綠水青山本自閒看笑瑞巖沒勾當自呼自應小兒頑自呼自應意深深珍重禪流莫錯斟雪後始知松柏操事難方見丈夫心玄沙遣書上雪峰玄沙白紙雪老同風一點水墨兩處成龍僧問雲門如何是祖師西來意門曰日裏看山日裏看山也大奇南峰高聳北峰低行人欲更問端的日出東方夜落西曉舜禪師上堂云諸方有弄蛇頭撥虎尾跳大海劍刃裏藏身雲居者裏寒天熱水洗腳夜來脫襪打睡早朝旋打行纏風吹籬倒喚人夫劈篾縛起頌曰易開終始口難保歲寒心相逢盡道休官去林下何曾見一人洞山黃龍偶淨戒寺夜坐作家相見嘴盧都靜夜焚香坐有餘覿面無言親切處等閒疑殺世狂夫香嚴上樹國清才子貴家富小兒嬌唱出無生曲聲聲調轉高丹霞燒木佛家貧顯孝子國難見忠臣相識滿天下知心能幾人趙州狗子狗子佛性無盜賊滿江湖命薄者當災水上按葫蘆狗子佛性有黃鶯鳴翠柳白鷺上青天面南看北斗大事未明如喪考妣大事已明如喪考妣勝世無端戈自擾太平軍令守長安木人空裏瞠眉看笑倒前三與後三雪峰古澗寒泉空合空兮鏡照鏡水投水處絕淆訛雖然徹底無涓滴未免當頭錯過多大通智勝佛十劫坐道場佛法不現前不得成佛道雲起晴空山陰面雷鳴天際雨風號無形一軸長生畫堪笑時人取次描雜著偶言參參參太無端悟悟悟由自負釋迦出世破草鞋達磨西來拭濁布生鐵鑄鍋飯是米做一年一度種東瓜堪笑滿園都是瓠參參參苦把麻油樹上攤悟悟悟枯木巖前鬼錯路如不參如不悟切忌光陰日虛度夜來明月上欄杆簾外轉身何所措莫因循休彷彿急須定當從前處等閒若未識家庭焉知祖父不出戶住住示語默上人語是謗默是誑總不恁麼隔靴抓癢老趙州道個狗子佛性有佛性無亦是平空起浪歷代來尊宿未免承虛接響引得依稀彷彿之流依模畫樣獨我語默上人不同伎倆直把將一串穿卻拋在大洋海底更不復望千古萬古為榜樣綱宗偈煙雲入地收溪水向上流青山無寸草虛空笑點頭示大懷禪人箇事人人雖具足工夫不到不方圓闍黎果欲超群類應好乘時緊策鞭示廓悟侍者回安南入市穿街似未曾鬧鬨鬨處冷如冰一朝打失娘生面大地山河絕點塵行腳感今古參方學道流三登九上沒來由分明本不從他得苦死區區費腳頭拄杖子赤骨條條氣宇昂高提祖印整頹綱縱橫在處難回避直下為人絕較量爆竹赤條條地小身才緊築無明一肚灰點著頂𩕳消息發驚天動地一聲雷佛事發法叔古源和尚靈骨上天龍真性圓明無動轉幻住業緣有變遷清淨法身藏不得杖頭掉轉上龍山入塔平生伎倆盡收拾末後風光別洞矢無縫塔中安身靜閒看綠水繞青山為絕塵老宿舉火塵既已絕當下明白本無去來有甚生滅撩起便行猶是第二月且道如何是第一月以火炬打圓相云吾今助汝者把火亙古圓明光皎潔為心虔碓頭起龕腳頭腳底無非本地風光碓嘴花開始見威音那畔任爾去住自由了無纖毫繫絆還得麼脫或未能山僧與你倒斷以拂子擊龕云悠悠徑達涅槃岸舉火踏碎無明窠窟斷絕生死根株今日徹底掀翻更見了無一物幸爾得到恁麼田地未免老僧一場叮囑且道囑個甚麼著火炬云看看火滅煙消後分明露出黃金骨為明意火頭舉火爾與老僧燒火老僧為爾舉火然雖燒舉不同貴爾循因得果且道是甚麼果下火炬云通身孽苦頓消除透出圓光淨裸裸為宗林沙彌舉火來忙去速知爾厭世不住雖是決烈男兒未免前瞻後顧欲復圓明妙體更須脫盡皮膚且道皮膚作麼生脫著火炬云山僧助汝一把火行實師字善一諱如純黔習安張氏子母陳氏十七歲在法海寺禮靈光老宿披剃閱兩載遇本師權和尚到寺一見器之便示參萬法歸一話依雲鷲山頂相和尚具足參天台月峰和尚開示做工夫訣要大有得力奈緣不就復上松巋參權權專囑師於行務中體究師愈自誓夜不用被限一覺便起於中省入多回只是不得本參話頭破一日擔柴稍暇在殿後花臺上經行次見蜂採菊花忽如人將物築胸一下相似不覺身心渾然片時方蘇通身汗下從此發明箇事疾走白權權即印證日後師又忽自翻察此事原來是不了之局方見得古人道大事已明如喪考妣之話不差也由是自加鞭策後得力得意處又不記其回數也權寂後師復志外遊十載自浙回挂笠天台有法叔古源和尚命師開法天龍次遷松巋三載復住天龍輯黔南會燈錄一部刊送入藏侍者學正拜述信善羅聖才陶聖潔徐大榮熊士旦丘生子羅萬鍾信善女馮門張氏深定汪門呂氏廣耀江門張氏廣賢張門張氏超常黃門陳氏廣善馬門夏氏實慶胡門王氏寂顯鮑門趙氏恒悅全門宋氏恒慧任門梁氏月輝王門宋氏祖超田門張氏寂明宋門俞氏恒祥宋門馬氏張門楊氏實嚴陸門張氏心輝余門趙氏心順朱門鮑氏寂紳朱門宋氏恒溥呂門趙氏恒意朱門趙氏恒審胡門鮑氏寂娛杜門馮氏仝刻武原陳子蘭書嘉興刊康熙癸未季秋穀旦板存嘉興楞嚴寺藏房善一純禪師續錄侍者明轉錄上堂浙回上堂去年二月去今年七月歸去來明歷歷動靜豈相違所謂去來不二動靜一如來去無依卷舒自在更說甚麼行雲流水鐵壁銀山只是於中有一句子料得諸人端的不下且道是那一句卓拄杖云黔中山浙中水上堂天上雲開新月出江頭風靜浪滔天路行人暮投屋宿夜半金烏入素廉到者裏德山有棒無處舉手臨濟有喝開口不得只如馬祖一喝百丈三日耳聾諸人又作麼生話會試道道看上堂法元不定理絕區分若言歸根達本看來也是重認家親何以故風吹不動庭前樹上堂有權有實有照有用好肉剜瘡空裏掘洞明眼衲僧十八不共因甚不共卓拄杖云等閒卓破趙州關鎮州蘿蔔三觔重吽吽上堂無頭無尾無背無面視聽週旋難瞞寶鑑到這裏因甚麼摸索不著阿呵呵笑殺萬象與森羅上堂止止不須說我法妙難思且道瞞得阿誰諸增上慢者聞必不敬信到底做賊人心虛是法非思量分別之所能解自是和臟著敗天龍雖是恁麼批判諸人還知釋迦老子為人落處麼良久云倒騎鐵馬上崑崙橫駕泥牛耕海岳上堂有一句子空勞勞地名不得然不得有一句子明歷歷地取不得捨不得有一句子露堂堂地凡不得聖不得有一句子活潑潑地觸不得背不得此四句中且道那句是賓那句是主那句是照那句是用於此分辨得下自攜瓶去沽村酒自著衫來作主人若也未能卓拄杖曰漕溪波浪如相似無限平人被陸沉喝一喝下座上堂當陽一句普天匝地亙古亙今纖毫不易不易之意絕思惟纔涉唇吻百雜碎分明突在髑髏前試問諸人會不會若不會捏則成團撲則碎饒你會也是金剛與泥人揩臂上堂秋至葉還落春來草自生夏熱日似火冬冷水成冰於此會得分明不是神通妙用若也不會要且法爾如然卓拄杖下座上堂搔著癢打著痛運用施為全體動喫飯穿衣非等閒屙屎放尿誰不共到這裏則與麼見成歷歷怎奈尋常放過故不能一切處流通還要知不放過底消息麼良久云天龍今日為汝得徹困上堂覿面堂堂本沒商量直下會去好肉剜瘡若也不會兩箇一雙雪巖老無端又道箇三玄三要松直棘曲四賓四主鳧短鶴長也是嚴寒雪後霜上堂萬法之本覿體全彰古佛心宗當陽顯示正恁麼時因甚麼見者聞者覿面千山遂喝一喝云也不得壓良為賤帽小知頭大身寒覺衣單上堂晴明天色好遊山杖拄青藜莫等閒踏到路經山險盡回頭不見海天寬到者裏不惟眼光爍破四天下且要納須彌於一芥之中藏巨海於一微塵內正恁麼時廓徹圓明即不無秪是明眼衲僧未許相見何謂如此到即不點上堂春山疊亂青春水漾虛碧珍重田舍翁正好知端的知端的兩手扶犁水過膝上堂拈起拄杖云三世諸佛歷代祖師並古今天下老和尚總只向這裏垂手為人天龍有箇不平之見意欲別資一路不妨奇特爭奈用盡伎倆出不得此圈繢亦直得向鬧市街頭拋碌磚去也卓一卓下座上堂古人道歷劫來事總在目前殊不知饒你向目前薦得也只是門頭光影邊事莫道衲僧本分事向上事亦猶未夢見在還要知向上一事麼良久云思之千里上堂頭上是天腳下是地珍重諸人莫看容易殊不知饒他三世諸佛歷代祖師互相出來橫說豎說也秪說到這裏且道這裏還更別有說麼良久曰不可總作野狐精去上堂踏翻向上關頭一切是非不管當陽一念無私廓爾前後際斷且斷後一句又作麼生卓拄杖云雨過夜塘春水深上堂如驢覷井藏芥子於須彌之內似井覷驢納須彌於芥子之中天之高地之厚又誰管你甚麼向上關頭最初末後咄釋迦老子無端道箇是法非思量分別之所能解轉見思量成窠臼咄咄咄上堂風來屋角頭鈴聲玎璫響大地山河側耳聽萬象森羅齊合掌惟有岩前石女忍俊不禁翻身起來拍手呵呵大笑且道他笑箇甚麼笑這一隊漢無端自是猖狂上堂一切都無思量廓然體露堂堂物物頭頭顯妙剎剎塵塵放光歷歷無可回避明明遍界難藏以此便為極則德山猶在隔江於此更進一步全身大地激揚然雖如是依俙彷彿之輩切忌認奴作郎佛誕日上堂未離兜率已降皇宮未出母胎度人已畢因甚毘藍園內又走將出來大驚小怪致令雲門忍俊不禁欲將一棒打殺與狗子喫貴圖天下太平所以引得後代兒孫箇箇上氣且道上箇甚麼氣驀拈拄杖云有條攀條無條攀例卓一卓下座上堂口渴喫茶肚餓喫飯祖師西來將甚麼幹所以天龍長老立誓不管人家長短不理是非看來也秪道得一半上堂千般說萬般喻卓拄杖一下云總是發明此箇事覿面依然隔千山可憐無限傷心意中秋賞月華元宵舞燈具今佛放光明助發實相義若也於此知歸自是掉臂而去擬欲踏步向前帶累臨濟德山著氣上堂達磨西來直指人心見性成佛擊拂子云人在這裏且道又喚甚麼作心性作麼生見佛作麼生成碧眼老鬍僧只知開口易不覺舌頭長上堂以字不成八字不合諸佛諸祖摸索不著一大藏教不能注腳直得寒山擎出𨍏轢拾得扶掌呵呵聾人側耳聽得清啞子對眾分明說諸人聞得總不疑祥麟只有一隻角咄上堂一人發真歸元十方虛空悉皆消殞且道山河大地草木叢林森羅萬象情與無情又向甚麼處所安頓若也安頓得下銅沙鑼裏滿盛油若也安頓不得未免以公作私正恁麼時且道安頓得底是安頓不得底是良久拍禪床云一把柳絲收不得和煙搭在玉欄杆上堂從朝至暮秪是者箇運用施為東擂西磨在在處處橫說豎說檢點將來何曾動著呵呵上堂承當即錯會則何妨不會不錯兩得無傷還得麼昨夜三更月朗今朝午後斜陽幾度望舟亭上客堪嗟無限錯商量上堂山僧昔年有段說話曰禪禪饑來喫飯困來眠道道城樓五鼓金雞叫除卻禪去卻道夜半日頭紅杲杲這般說話當時將謂直截提持真實相為殊不知今日看來大似抱柱澡洗把纜放舟自銜一場漏逗而今另有箇撇脫一路復與大眾商量禪禪般羅圓道道花光照除卻禪去卻道淨裸裸兮赤條條洞房深穩少人知惟許佳人親得到到這裏誰是佳人即不問且到後一句又作麼生卓拄杖云莊家無牛空起早上堂半開半合全放全收高低普應遠近同儔山悠悠水悠悠萬象森羅秪自由鳥啼花放春來早葉落深林報晚秋釋迦老人無端喚鐘作瓮達磨大師也是指鹿為牛所以引得那觀音大士並跛腳雲門於中喚出箇圓通境六不收不知頭上更安頭令人千古鬧不休喝一喝下座因玄士論三教義上堂洞然大道本無私萬彙咸藏不礙之爭奈迷元昧本者各分名相有支離而今分底且置堪笑古人無端預先分出箇甚麼明心見性窮理盡性修真養性者一隊漢將謂各逞己長殊不知自是將箇官物向私地下商量莫定所以引得後輩兒孫逐末棄本強分門戶自相矛盾各各執著成病天龍今日路見不平直得作死馬醫試將三家門戶擊碎關鍵合成一統免得於中分門列戶免分人我免役心神免成愛憎既然如是且道統合一句又作麼生驀拈拄杖云麗天紅日無私照大地山河一樣春卓一卓下座上堂入門是家出門是路三世諸佛何嘗指出鍋是鐵鑄飯是米做歷代祖師不曾道著天龍今日不避門庭冷落直得傾心相為若較之法華會上法堂前亦未免艸深三尺正恁麼時於中還有不似箇般見解底麼收取詩書歸舊案且共扶持折腳鐺上堂卓拄杖云者個若作佛法商量三家村裏臭老婆共是同參何啻朝打三千暮打八百不作佛法商量西天九十六種之類少你不得當與麼時且道作商量底是不作商量底是天龍任麼告報大似夢裏弄猢猻也好與一頓上堂乾坤之內宇宙之間中有一寶密在形山古人恁麼說話只知瞻前不知顧後盡大地是沙門一隻眼亦不知教壞許多人家男女上堂撞鐘鐘鳴擂鼓鼓響鄉裏老婆相打不會捏拳頭兩來齊解用巴掌露柱燈籠死守陷蹈木人石女賣弄顛狂會得一任橫三豎四不會也不必著忙何故三月春花滿道傍結夏上堂結夏安居諸方舊例盡謂大圓覺海為伽藍身心安居平等性智者箇雖是大施門開革凡證聖爭奈點檢將來未免自涉限禁天龍者裏總不然日間三餐夜來一寢朝朝應用只尋常繁興不出那伽定上堂卓杖下喝豎拂拈槌依俙彷彿之輩未免作佛法商量饑餐渴飲閒坐困眠定是作衲僧本分秪如憩足亭與鳥龍洞相撞摺耳岩合休心所磕額諸人又作麼生話會者裏不妨試出來道看若也道得分明許你具參學眼若道不得今年時歲豐熟且喜天下太平上堂良久以手摑口云著甚來由太多嘴生上堂三世諸佛是弄泥團漢歷代祖師是弄泥團漢古今天下老和尚總是在泥中洗土然雖如是若論垂手為人直饒盡其神力也跳他圈繢不出若是衲僧門下有馬騎馬無馬步行上堂盡謂三世諸佛開口道著歷代祖師動步踏著如今盡大地眾生人人面門有一張口各各肚下有兩隻腳又且看是踏得著踏不著道得著道不著莫謗如來正法輪免教過招無間獄結制上堂牢關把定萬境一如坐斷千差真常不二明明絕去來歷歷無對待離名離相絕妙絕玄正與麼時直得恁麼中不恁麼九十日內無虛棄之工不恁麼中恁麼二六時中有得意之用若也於此見得明信得及行得力自有一日寒灰荳爆枯木花開其或未能他時後日有事在且道他時後日有甚麼事良久曰擬欲登高望崎嶇路轉紆上堂止止不須說兔馬有角牛羊無角我法妙難思天晴日頭出落雨地下濕到這裏又誰管伊憎上慢不憎上慢敬信與不敬信卓拄杖云畢竟水須朝海去到頭雲定覓山歸上堂潭深魚睡穩林深鳥不驚當頭石虎叫喚出祖師心且如何是祖師心良久曰雲在嶺頭閒不徹水流澗底太忙生上堂山從平地立水向溪中流風生大野雲蓋山坵衲僧家到者裏直得各各鼻孔端正那管他第一義諦向上關頭初三初四月如鉤上堂為眾竭力禍出私門古人恁麼道猶自見事不真喚鐘作甕自相攪擾天龍見處則不然為眾竭力贏得一籌且道如何是一籌良久曰收臘八日說戒上堂明星燦處戒珠圓箇裏分明不浪傳若是其人當委悉何勞矢上更加尖於中還有委悉者麼有不妨出來與釋迦老子把手共行如無山僧更與尖上加尖去也說戒下座臘月十一日公出解制上堂期會未圓先解制諸人未諳其中事其中的事沒商量珍重各人自主張且道作麼生是自主張底事以拄杖橫肩云出門便是朔風凜吹綻梅花雪裏香為本師權老和尚挂真玉泉室中全身打失松巋峰頂露頭露面數十餘年惑亂眾生今日那堪再見然雖如是見見之時見非是見見猶離見見不能及既見不及又且如何供奉指真云夾路桃花風雨後馬蹄何處避殘紅歸里詣本師真前上供拈香云無端冤撞師貲因賺我移閒累一生今日又經山下路免來設供把香焚亦不為水源木本亦不為報德酬恩且道意在於何良久插香云珊瑚枕上兩行淚半是思君半恨君元日上堂露柱燈籠不老春微微冷地笑時人可憐多少英靈漢瞠眼明明說舊新且作麼生是不涉新舊底句良久云嘴唇挂碧斑豹博舌頭當的帝都丁喝一喝下座小參除歲小參新年舊歲兩頭看新舊都盧沒兩般亙古今來元不易陰陽節令有更遷所以古人道有片無陰陽地包羅萬有含吐十虛能為萬象之主不逐四時遷變諸人每日十二時辰常在其中穿衣喫飯迎賓待客屙屎放尿運用施為總不曾違背一絲毫許更論甚麼踏得著踏不著直饒踏得著也是驢馬頭邊截兔角晚參山僧行腳時多見諸方老宿垂手為人只將箇禪道佛法四字籠絡當時學者少見一箇半箇提持此事痛切為人當時學者亦是十箇有五雙只向禪道佛法上著腳亦未見有一箇半箇真實行履體究此事所以山僧當時多抱不平之見嘗謂汝等者班後生恁麼參學饒你參到髮白齒黃也只是在箇禪道佛法裏糊鑽亂撞頭出頭沒若論此事驢年也未夢著在往往恁麼道了亦不見有一箇半箇痛切底出來酬酢看如何是此事設有當時山僧自是不惜眉毛也直得向他道箇正好疑著何以故參禪若不起大疑情只向心意識邊摶量要且盡屬狂解所以古人道大疑則大悟小疑則小悟不疑則不悟疑有十分悟有十分不是假言故山僧行腳時尚有如此心行況今住世為人又爭肯將箇禪道佛法籠絡今時學者是必直截提持真實相為去也只是於中還有真實體究底麼若有山僧且問你作麼生是此事者裏不妨試出來緇素看看若也緇素分明始得不負參學之志若也未能莫道不疑好小參教中道一切有為法如夢幻泡影如露亦如電應作如是觀山僧尋常以此教人為切不覺便成熟境去也故爾昨夜三更時分纔輕眨眼便夢見須彌山王與娑竭龍王相鬥攪得四海五湖翻天大浪震得東海李鬍睡寢不安惡發起來𨁝跳上三十三天築著帝釋鼻孔帝釋遣四大天王向空中轟一聲霹靂直得盡大地一時河清海晏浪靜風恬湛湛澄澄凝然不動然後有箇日月燈明王款款地從東湧將出來遙觀三千大千世界眾生歎謂言善哉善哉大地眾生總被者一隊漢攪亂一場箇箇拋家失業糊鑽亂闖奔趨忙忙無時暫息若不是吾放光動地焉能得他知歸那時間汝等諸人正熟睡生那裏曉得殊不知者場幻夢大有些子意事所以山僧未肯瞞頇放過直得將來為眾舉揚正恁麼時且道昨夜三更時分底是而今底是卓拄杖一下云又且看是有為法耶是無為法耶諸人向者裏試分辨看若也分辨得下任汝橫擔拄杖高挂缽囊獨步大方縱橫無礙其或未然待汝睡醒來再向汝道呵呵端節小參五月五日是端陽時節分明絕較量人人頭上戴青艾箇箇口裏喫雄黃一謂逼毒氣一謂殄諸殃是則是只是於中氣味不堪爭似我衲僧家乾乾淨淨點滴無染有別長且道那裏見他長處良久曰醒眼看醉人除夕小參古人分歲烹露地白牛炊黍米飯煮野菜根大家喫了燒榾柮火唱村田樂天龍今晚與諸人分歲也不烹露地白牛也不炊黍米飯也不煮野菜根也不燒榾柮火也不唱村田樂且道又作麼生直教洗腳了也上床眠明早起來慶新年爆竹一聲承快便笑看王老夜燒錢示眾示眾箇事見成不假修證一念纔生便即是病直饒你向一念未生已前薦得分明底亦不妨回光看看是第幾念了也若較行不知行坐不知坐見山不是山見水不是水逢緣遇境一一把斷底不惟撞頭磕額要且正似業識忙忙無本可據更饒你把斷要津不通凡聖千差坐斷萬境寂然鐵壁銀山渾無滲漏者個雖是定慧圓明不落諸數又只恐纖毫頭有差別亦未免打入陰界之中黑山鬼窟裏去在還端的得麼若實腳跟穩當道眼圓明者一任放教閒閒地行只是行坐只是坐見山是山見水是水見山是山了無山色可辨見水是水亦無水相可分逢緣遇境好惡分明如木偶人兩絕回互到這裏所謂撞著道伴交肩過一生參學事畢且道畢後如何良久曰不問家客來何事閒持經卷倚松立示眾若實一念不生則自然前後際斷合空劫之境於目前尚不見有空無之相真得微機發妙果然突出難辨會目前之境於空劫之先則萬象森羅無藏隱處亦且了無對待之跡所以道世法住法位世間相常住正恁麼時上不見有諸佛下不見有眾生情與無情性相平等所謂無凡無聖無古無今無前無後無大無小寬闊非外寂寥非內動靜二相了然不生到者裏何等清淨何等安樂何等受用古人無故又道箇甚麼拈卻炙脂帽子脫卻鶻臭布衫咄又且道如何是炙脂帽子如何是鶻臭布衫赤條條地人無數幾箇男兒得解穿示眾箇事本自見成不用別尋道理你總不恁麼時祖師在你腳頭腳底你若眼目定動早是蹉過久矣你再如何若何更是白雲萬里然雖如是若不親見上大人焉能知是丘乙己且道上大人在甚麼處良久曰又莫蹉過示眾心生法生心滅法滅三世諸佛有口無說示眾有念即凡無念即聖是則是秪恐未到與麼田地又切莫於此躲跟何謂如此攪不渾兮澄不清不動干戈不太平參示眾離心意識參絕凡聖路學古人說話甚是的當秪是而今切莫顢頇放過正好向這裏看參又參箇甚麼學又學箇甚麼此語不妨一一見得落處方於己躬下有趨向分示眾善無善惡無惡只在各人辨清濁行則行止則止箇裏分明有彼此其中涇渭不能分未免鋀石混真金天龍傾心相為汝莫教自瞞成辜負還知麼葫蘆圓長雖一般甜者甜兮苦者苦參示眾自古根元雖不異爭奈千年田地八百主警諸人急須究莫莽鹵甜瓜徹蒂甜苦瓜連根苦咦示眾米多做飯米少煮粥道人活計千足萬足若貪豐足未免勞碌所以道知安則榮知足則富還知麼嘴唇兩片皮牙齒一具骨示眾古人道有一句子到你則啞卻我口無一句子到你則瞎卻你眼這般說話總是將眾人物作己私用若是皮下有血底漢子直得當面便唾有甚麼過得人一牛還人一馬示眾一念不生萬緣頓息佛法兩字猶是剩語諸人若也於此見得明信得及行得力自然有一日疑團子迸破方知天龍說話不誑語不異語真實語中秋示眾天上一輪月盡大地人皆見今晚雖是雲遮要且清光半點難瞞既是難瞞更收拾各照一句又作麼生良久曰暫時不見暗昏昏機緣師行腳時有老宿問師曰法華經云大通智勝佛十劫坐道場佛法不現前不得成佛道你道意旨如何師曰李向赤邊咬宿曰恁麼則你向後為人又作麼生施設師曰我終不教壞人家男女僧問佛未出世時如何師曰抬頭見天曰出後如何師曰低頭見地曰出與未出時如何師曰春風一陣來滿地花狼藉僧問曰如何是無縫塔師曰七花八裂曰如何是塔中人師曰七顛八倒曰恁麼則某甲不著便師曰知過必改僧問曰洪鐘未扣時如何師曰閒曰已扣時如何師曰響曰扣與未扣時如何師便打曰誰教汝與麼顛倒見僧問曰枯木花開時如何師曰試摘一朵來看曰直得某甲無下手處師曰謝闍黎供養僧問萬水千山如何登踄師曰著甚來由曰恁麼則不登去也師曰早是千里萬里僧問如何是道師曰火熇面前熱曰如何是道中人師曰風吹背後寒僧問曰師唱誰家曲宗風嗣阿誰師曰汝在那箇黑山鬼窟裏出來曰恁麼則雙桂的裔昭覺親孫去也師便打曰眾生顛倒昧本逐末僧問曰如何是道師曰門前底曰如何是禪師曰屋裏底曰如何是佛師曰山上底曰如何是法師曰鬧市頭底僧復問曰恁麼則如何是門前底道師曰一任往來曰如何是屋裏底禪師曰閒坐困眠曰如何是山上底佛師曰大底太石頭小底小石頭曰石頭焉得是佛師曰卻被闍黎看破曰如何是鬧市頭底法師曰鹽米三時價僧乃禮拜曰謝師答話師便打曰學解之流誰與汝答話僧問德山托缽意旨如何師曰闍黎喫飯也未曰不曾師云既不曾打點缽盂去又一僧呈頌不契師以偈示之曰德山托缽下堂前一拶回頭不強言珍重莫作奇特會饑來喫飯困來眠僧問曰如何是戒師曰殺人須見血曰如何是定師曰東湧西沒南湧北沒曰如何是慧師豎拂子曰喚作拂子則觸不喚作拂子則背曰即今以傳持為戒秪如威音王已前又喚甚麼作戒師曰切忌撥無因果僧問曰如何是正法身師曰脫空謾語漢曰如何是正法眼師曰瞎拈古舉密菴傑上堂云佛說一切法為度一切心我無一切心何用一切法既無心又無法山河大地甚處得來見聞覺知復是何物乃喝一喝云臨崖看滸眼特地一場愁師曰密菴老人恁麼批判情知喚山河大地是心見聞覺知是法了也是則是只恐錯認定盤星天龍今日只管與麼判斷任他後來諸方檢點不過道箇脫空而已矣有甚麼大害舉高峰祖道海底泥牛啣月走岩前石虎抱兒眠鐵蛇鑽入金剛眼崑崙騎象鷺鷥牽此四句中內有一句能殺能活能縱能奪若檢點得出許汝一生參學事畢師云高峰老子恁麼告報大似傍若無人把將空拳誑小兒純上座不管隨邪逐惡也輒有一偈曰無毛鷂子拍天飛蝦蟆樹上理毛翼獨腳石女雲中叫兔角龜毛堪作梯此四句中亦有一句亦能殺能活能縱能奪若檢點得出三十棒不較多何故重賞之下必有勇夫舉古德云向上一路千聖不傳向上一路千聖不然向上一路熱碗鳴聲師云古人恁麼告報大似不會喫飯詐道不饑未免自賺瞞頇天龍則不然向上一路熱餈饃一個菜荳腐一碗喫在肚皮裏一天飽到晚頌古牛過窗櫺山頭石虎叫一聲海底泥牛側耳聽跛鱉盲龜生恐怖老龍高臥不知春三不是秋去冬臨春復春一番拈出一番新雲在嶺頭閒不徹水流澗底太忙生南泉斬貓為人閒事長無明老倒南泉太赤心公案而今成話杷幾個知恩解報恩本身盧舍那水自綠兮山自青野花啼鳥一般春行人休向途中覓到家亦如在路程無位真人李公醉酒罵張公卻被張公罰一鐘只得李公無出氣依然渾醉在其中丹霞燒木佛春寒多雨水夏寒水斷流中書堂中事樵人那得謀雜著淨行益法文欲斷眾生愛欲苦當學菩薩清淨行學得菩薩清淨行入得菩薩安樂境入得菩薩安樂境證得菩薩不動地證得菩薩不動地明得菩薩受用法明得菩薩受用法演得諸佛權實教演得諸佛權實教度得無邊眾生苦度得無邊眾生苦方知眾生苦無本應從一心不淨生珍重時流勿放逸清淨行門擬修持清淨行門若不修不惟難斷愛欲苦亦且能摧智慧種智慧種芽若焦枯致感來生多盲昧盲昧之中不可言眾業於此復連綿眾業一復看何如清心警惕莫糢糊可知菩薩清淨行能斷眾生愛欲苦勉參學凡為參學者參須實參學須實學不可只圖混日而已豈不知參不明不是參學不至不是學參不到利人不是參學不能化物不是學若言獨善其身不若三家村裏無事漢參禪偈參禪須透祖師關莫把弘為當等閒個事縱然瞞不得臨機殺活也難難坐臥經行總一般其中有別隔千山工夫未得入頭處切忌高心把自瞞示眾玄玄玄又更玄玄鼻孔分明在目前歷歷見成猶不薦可憐掘地覓青天覿體分明一句奇包含萬有別無欺雖然本是見成事也要男兒各自知一事無心萬事休纖毫著意個中讎順天如理干戈息莫與空王作對頭箇事未明先習定西天外道並同儔疑團打破方堪養莫學狂徒自任休通身似口吹毛劍萬物如何得近傍當下不留佛與祖逢人莫擅露鋒鋩天龍實語應須聽佛法禪道俱莫論直教一念如土木自然當下心無病慎逸既做出家之人必當努力修行若也尋常度日便是賴佛偷生慎雲松法姪霞山脈發爾為先振矩提綱接後賢把斷要津行正令諸方泯盡野狐涎示悅可侍者心悅成佛猶是妄可知自性本無迷布毛落處翻身轉三喚機緣定不欺示徹可侍者徹地通天一著子可宜直下便承當諸方五味不隨去別有家風一段長示闊用侍者闊然無聖是誰憑大用全提屬爾能不落階級中內外頭頭無礙自相應贈化月法姪隨師多載住松巋辛苦勤勞沒暫違故爾化緣別外展月明無處不光輝示慈音侍者老僧有用喚慈音喚去呼來莫負心識得慈音原是爾當人品弄沒絃琴示指南禪人指南一路絕淆訛煙水百城徒自磨樓閣門開方見錯分明鷂子過新羅哭法叔語賢和尚祖道垂秋實可悲那堪吾叔更西歸不惟慘淡人天眾野老聞聲也皺眉本師塔前炷香報德酬恩一瓣香於何憑據作商量吾師面目分明處啼鳥山花為舉揚緣事二十餘年沒被單坐來夜靜覺身寒思量坐臥原無別爭奈無人為放參看書字意無通強看書圓將遮眼遣時餘若還空坐人來語那得閒情靜裏居自適當陽無忌絕差殊妙用縱橫理事無夜半空庭搔首望天邊雲盡月輪孤縱橫無礙不落陰界揮起鋤頭打破土塊佛事為黔靈師翁赤老和尚起龕一時撦破縵天網閒把絲綸挂碧峰瑞鳳祥麟都不顧別行步步起清風善一純禪師續錄終信善潘照旵鮑廣輝古聖跡龍普雲雷普淨葉德深劉悟聖翁際會汪廣德周繼先僧聯鎧張廣悟左玉桂鄧萬鎰田寂弘劉名聲田祖魁江廣修廖尚志田實樹方覺普楊聰葉寂賢方聖祚栗語進曾道成葉真極高枝芳曾朝柱張國偉余起雲胡淨智秦祚開傳起鰲羅淨朝桂月馨吳君道等同刻信女危門王氏廣鏡曾門江氏祖德高門李氏恒靜聶門劉氏恒修胡門危氏恒祥李門趙氏寂素張門張氏恒裕黎門馮氏王門胡氏胡門李氏廣綠潘門潘氏恒念桂門李氏實相劉門朱氏乾達王門劉氏聖照陳門龍氏廣賢羅門葉氏恒旨梨門李氏張門陳氏普法鮑門雷氏廣述劉門雷氏廣學袁門呂氏吳門劉氏聖禎熊門鄧氏寂宗鄭門王氏廣明徐門朱氏恒修雷門蔣氏法慈暨門延氏雷門詹氏恒幀雷門慈氏心悟秦門杜氏聖蔭聚門曾氏寂聰葉門王氏妙樂劉門羅氏恒能張門汪氏聖清等同刻海鹽陳子蘭書楞嚴夏維寧倪爾超同鐫康熙丁亥季夏穀旦嘉興楞嚴寺般若堂藏板
