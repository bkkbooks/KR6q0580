body:
  text: 序一日靜坐書齋讀無名公傳齋之東角有梅花開放俄而寒風陣陣一段奇香噴鼻而過始嘆冰肌玉骨另一乾坤不與萬卉同芳正欲呼童烹茗假詩相酬時有禪者二人持善一禪師語錄一帖索予為序禪師乃吾鄉人與吾為方外交自幼英特出塵于法海寺禮靈光老宿披剃嗣法松巋善權和尚久親權座深入權室真誠參究手眼圓明然後遍歷湖湘三吳兩浙看驗諸方道無異源浩志歸來開法天龍次遷松巋復住天龍有語錄三卷閱其拈頌機緣宛有古人之風其上堂小參示眾皆演最上一乘事無疊床架屋之弊而且有璧合珠聯之美也簡而文約而理卻與拈花微笑教外別傳之旨共相發明雖在棒喝門庭中不事搖唇鼓舌落其圈套如雲門餅趙州茶外面觀之尋常知音嘗著汗下即公諸海內有識者自然鑒賞矣又何殊乎梅萼之清奇也哉禪師可謂不負出塵遍參海內數十年之苦心一息無容稍懈方能說此無法之法以為濟世之津梁也是為序康熙壬午季冬中浣習安後學法弟胡國翰雲峰氏沐手敬撰序佛法非細事也會佛法而能弘佛法尤非細事也既會已弘已而能居人所不居之邦弘人所難弘之法斯人也吾嘗想見之而未始一見也癸未夏善一純公不遠五千里自貴筑來以語錄稿相質於予予覽之終卷不覺矍然曰黔地向聞無佛法也今若是疇謂黔無佛法乎純公黔人也自居學地便負逸群志矢兼濟願已而遍參吳越楚蜀凡諸名望宗匠莫不親披運斤之風仍反黔中習安道俗遂翕然相推戴不減西河之於昭叟也初出世住普陽之天龍次遷松巋惟務以本分鉗錘激勵來學其接人也機徑截而不涉廉纖其說法也語渾璞而不事雕琢故能感貴筑三十餘城靡不響道皈信所謂居人所不居之邦弘人所難弘之法今於純公見之矣純得法於善權位位嗣月幢了了嗣丈雪醉醉嗣破山明明嗣天童悟其源清流潔根大叢茂夫復何言易曰大車載有攸往此予所以深有望乎純公者故為之敘禾州普明逸樵超嶼撰善一純禪師語錄目錄住天龍山普德禪寺住松巋山普光禪寺復住天龍普德禪寺卷一上堂卷二上堂小參卷三示眾機緣拈古頌古雜著佛事行實
