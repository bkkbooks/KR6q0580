body:
  text: 侍者學正録復住天龍上堂鉗鎚再握寶劍重揮擊碎陳年窠窟剿絶當時露布揭示頂𩕳正眼發輝向上宗猷已聞者不妨再聞已見者不妨再見雖然如是且道聞又聞個甚麼見又見個甚麼到者裏若是靈利底直下掩耳歸去那甘聽受處分者些則且置秪如整舊家風應時演化一句又作麼生道天高群象正海闊百川朝復舉寶壽開堂三聖推出一僧壽便打聖云與麼為人瞎卻鎮州一城人眼去在壽擲下拄杖歸方丈師云據虎頭收虎尾還他二大老作略欲論臨濟向上宗乘敢保夢也未夢見在天龍恁麼告報且道還是肯伊是不肯伊卓杖一下云逢人切莫錯舉上堂天龍峰頂別是人間猿啼嶂外鳥噪雲邊不是目前法亦非心外事掀翻陳年骨董揭舒象外幽玄玉壺影裏劫初前亙古乾坤不變且作麼生是應時及節底句喝一喝云禹力不到處河聲流向西上堂得之不喜失之不憂進之不見其前退之不見其後定之不見其住動之不見其流玲瓏八面無邊表廓徹圓明一鑑收收收芙蓉只在秋江上堪笑騎牛更覓牛喝一喝下座上堂人善被人欺馬善被人騎有般漢聞天龍恁麼道即此為勝負邊事呵呵恁麼見解真乃世諦流俗阿師殊不知三世諸佛歷代祖師並古今天下老和尚競出頭來總只以此如是且作麼生是如是底事卓拄杖一下云囌嚕囌嚕㗭唎㗭唎聖節上堂撥轉上頭關捩子普天匝地盡光輝四海五湖煙浪靜十方世界樂無為正恁麼時共享堯天則且置秪如知恩報恩一句作麼生道卓拄杖云天上有星皆拱北人間無水不朝東上堂十五日已前雲迷山色暗十五日已後風動水文生正當十五日晴霽天清水碧沙明漁父笙歌滿岸樵牧起舞盈岑不是目前法非耳目之所到直得牆壁瓦礫點首燈籠露柱揚眉山僧一時乘興作得山偈一首舉似大衆青山高突兀雲傍嶺頭生山前溪澗水潺潺響似琴上堂一往直行茫茫宇宙千差坐斷死水澄潭饒你運用無虧隨緣得妙也是杓卜聽虛聲且道總不與麼時如何良久曰風送白雲飛嶺外水流黃葉到江心師誕日上堂一年算一歲十歲算一旬循環算將去驢年算不清因甚不清明明無遷意徒妄立生庚且作麼生是不遷意卓杖一下云蟠桃核裏舊時仁臘八上堂六年兀兀坐安然多少好夜半睹明星依舊成顛倒成顛倒殃及兒孫猶未了喝一喝下座佛誕日上堂四月八浴佛日九龍吐水沐金軀釋迦老人赤骨律驀拈拄杖云雲門大師來也且看作麼生相救以拄杖左邊一卓云釋迦老人請過者邊著右邊一卓云雲門大師向者邊來山僧恁麼相救且道還得也無中間一卓云不因柳毅傳書信何緣得到洞庭湖上堂山僧持杖升堂大衆圍繞禮拜一一個事分明豈肯顢頇捏怪是則是只是向者裏見明親切得底正好且居門外何以如此良久云話在上堂不說心不說性語默動靜皆是病棒喝奔雷接上機波斯眼睛烏律律總不與麼來素隱行怪畢竟如何即是良久喝一喝云事從叮囑起上堂不是風動不是幡動者裏也不妨疑著仁者心動切忌認驢鞍橋作阿爺下頷還知祖師落處麼良久曰利劍拂開天地靜霜刀才舉斗牛寒上堂斬釘截鐵不為本分就下平高未是作者饒你拈頭作尾拆東補西擲大千於方外納須彌於芥子正好朝打三千暮打八百何故中秋午夜一輪月上堂三丈長八尺短忙則奔波閒則不管古今天下人同鼻出息同口喫飯同舌說話所以青春誇年少皓首論蒼顏還會麼分明持鉢衲僧事汝等諸人總向者裏覓甚麼碗上堂春到百花開秋來林葉落珍重莫作時節會千古傳來這一著這一著人人肚下兩隻腳中元日聖學龍居士請上堂鍾鼓交加人天普集山野升堂演第一義且第一義作麼生演不見道欲識佛性義當觀時節因緣時節若至其理自彰大衆且道即今是甚麼時節此是七月十五中元地官聖誕之期聖學居士敦請山僧上堂正恁麼時還是舉唱時節因緣底是發明第一義諦底是驀拈拄杖云看看時節因緣也在者裏第一義諦也在者裏只是饒你諸人向者裏見得分明天龍拄杖子猶未肯相許因甚不許卓一卓云紅霞穿碧落白日繞須彌上堂驀拈拄杖卓一卓云若向者裏見得分明底一任掀倒禪床喝散大衆掉轉頭去孤迥迥峭巍巍羅籠不住呼喚不回灑灑落落自由自在作個無事閒道人去也豈不慶快平生倘或尚留觀聽未免被拄杖子穿卻鼻孔且道那裏是穿卻處不見道你有拄杖子我與你拄杖子你無拄杖子我奪卻你拄杖子喚作拄杖則觸不喚作拄杖則背道得也三十棒道不得也三十棒德山今夜不答話問話者三十棒問僧甚處人僧曰新羅人山云未跨船舷早已三十棒脫下衲衣一頓棒如何是佛法的的大意三頓六十棒何以如此聻復卓一卓云芙蓉不在秋江上上堂無巴鼻有來由觀世音菩薩將錢買糊餅放下手原來卻是箇饅頭今日落在天龍手裏不免分似諸人去也卓拄杖下座上堂三世諸佛是三世諸佛歷代祖師是歷代祖師天下老和尚是天下老和尚諸人是諸人山僧是山僧打水無相濺一切皆自辦惟有一句子珍重親切看且道是那一句肚餓要喫飯達磨忌拈香十萬里航海而來早是腳跟未穩梁皇殿上失利少室峰前拔本賺他神光斷臂千古笑殺英靈因甚麼又一年一度一燒香五音六律別宮商百丈祖忌拈香野鴨飛去各西東扭住鼻頭空忍痛禪床角挂拂子兮賣弄爪牙法堂前卷卻席兮正顯大用更有一般奇特處巍巍獨坐大雄峰喝一喝密祖忌拈香當面做賊弄巧成拙鞭搭海底泥牛山頭石虎流血殃及不肖兒孫至今放過不得既放過不得畢竟如何插香云賊賊重陽上堂歷歷無邊表明明絶覆藏形名該不得何物許承當還有承當得底麼若是登高到頂底漢子自然眼空四海氣蓋諸方依稀倣佛之流只得青山緑水西來意翠竹黃花古佛心喝一喝下座開爐上堂大冶紅爐今豁開銅頭鐵額此中埋等閒煉作金剛彈拋出人前打落腮且道公幹在甚麼處良久云不須柴炭扇風火直教寒爐撥死灰喝一喝下座結制上堂把定牢關坐斷岐路內不放出外不放入明明個裏絶商量九十日中自成屈且道屈個甚麼山僧畫蛇添足諸人無繩討縛直饒向者裏散去每人腳跟下早已三十痛棒雖然如是要且事無一向何故閻羅老子打算飯錢莫道山僧不言且道言個甚麼良久卓拄杖一下云一等共行山下路眼頭各自看風煙喝一喝下座上堂惟此一事實餘二則非真且道是那一事到者裏十個有五雙未免指鹿為馬認奴作郎還委悉麼良久云各人自掃門前雪莫管他家屋上霜上堂雲從龍風從虎聖人作而萬物睹山僧等閒作一出拄杖為打禾山鼓且道是甚麼曲調駐雲飛下山虎拍拍總是歌敲唱誰能阻聽如聾見如瞽視聽最分明諸人莫莽鹵擊拂子云還會麼會得底六六三十六不會底五五二十五因事上堂個事見成本無缺剩豈欺未明可憐不信呵呵也是為他閒事長無明上堂佛法世法本來不二好醜妍媸由妄分析若也打成一片自然處處逢的然雖如是咦切忌青天白日上堂呼牛喚馬坐東走西驅奴使婢訓子教孫一切智智清清無二無二分無別無斷故因甚麼塵勞滾滾業識茫茫且道過在甚麼處良久曰幸自無瘡勿自傷上堂瞿曇貴離諸著仲尼要在絶四二大老雖是剿絶為人怎奈前不搆村後不抵店純上座則不然直管教理作理明事作事辦賊來須打客來須看何謂如此海鹹河淡達磨忌拈香梁皇殿上道不識面赤不如語直少室峰前癡面壁多虛不如少實當時隻履西歸而今討甚巴鼻有巴鼻無巴鼻插香云萬古清風吹何極丈老和尚忌拈香雙桂室中戳瞎頂𩕳正眼昭覺堂上打失兩莖眉毛帶纍後代兒孫東尋西討今日不肖遠孫向香煙堆裏拈出也要諸人共見共知還知麼插香云莫教錯認定盤星喝一喝下座上堂拈華微笑空自勞攘斷臂安心一場懡㦬德山入門便棒臨濟入門便喝大似斗筲氣相秪如掩室杜口也是平地干戈何況搖鈴打鼓擎權舞笏輥毬打地顧劍指瓶總是弄猢猻家具還知麼泥牛吼月空谷震木馬嘶風鐵樹驚平地擎山分大小雲開日出耀乾坤喝一喝下座解制上堂正月十五日諸方齊解制衲子束腰包寰中任來去去去實不去途中好善為來來實不來明窗下安排來去本無羈何必強撕捱卓拄杖一下云天龍今日更與放開線道一任南天台北五臺只是於中有一句子也要向諸人說破且道是那一句饒你走盡天涯並海角歸來終虛費草鞋怎似雙眼泉畔老梅樁孤守寒巖鐵骨冰心渾不易一年一度占春魁上堂也大奇也大奇當陽突出不思議二三子以我為隱乎吾無隱乎爾到者裏若論把斷要津不通凡聖千差坐斷有無不立底檢點將來又是扶籬傍壁雖然如是不得春風花不開花開須借春風力咄上堂天之高地之厚南北東西無過咎上下四維無等匹八角磨盤空裏走走走分明動轉不相違說甚麼瞻之在前忽焉在後謬謬更有釋迦入雪山達磨居少室立雪斷臂腰石舂米七破蒲團如喪考妣看來總是不唧溜天龍恁麼告報非是無端譏古要為諸人掀翻窠臼且道掀翻後又作麼生九旬霜雪盡花開天地春佛涅槃日上堂趙州祖師活一百二十歲釋迦老子八十向雙林入滅一一揭示分明諸人因甚不徹徹不徹薪盡火還滅喝一喝下座上堂恁麼也不得不恁麼也不得毫釐有差天地懸隔所以道一切聖賢皆以無為法而有差別不差別踏著稱匜原是鐵喝一喝下座上堂山僧不識文字說法全沒意事不入智人耳不合第一義只解以空合空以水投水若恁麼會去山中石女配丈夫海底泥牛吞巨鯉若也不會問取十字街頭廖鬍子小參入院小參人人本有個個不無尊貴天然見成受用者般說話不是打在無事甲裏便是錯認驢鞍橋作阿爺下頷正好與三十棒又有道淨裸裸絶承當赤灑灑沒可把將謂脫體無倚便是殊不知正似落空外道魂不散死人前不搆村後不抵店亦好與三十棒又道恁麼也不得不恁麼也不得恁麼不恁麼總不得到者裏把斷要津不通凡聖才涉思惟便落階級者個如劈箭機似急流水雖是一往直行檢點將來也好與三十棒何故此事本無如是故見前大衆宜善參詳既是臨濟兒孫今來共相毗贊宗乘切不可作者般倚草附木見解直須擊碎髑髏掀翻窠臼莫守舊時途轍只教一句當天八萬門永絶生死然後向頭頭上顯物物上明隨機應用變化無方拈一莖草作丈六金身將丈六金身作一莖草有時向十字街頭橫拖布袋兜三惹四有時向孤峰頂上盤結草菴罵祖呵佛正恁麼時且道功歸何所卓杖一下云龍袖拂開全體現象王行處絶狐蹤喝一喝除夕小參臘月三十夜打鼓喫普茶一齊分付了何必再周遮不周遮東家人和氣西家不用打籬笆是則故是秪如米裏有蟲飯裏有沙諸人又作麼生檢點若檢點得出不負相從度歲華若也未能來年更有新條在惱亂春風卒未休喝一喝晚參古德云住持有三法缺一不可喝一喝云是何言語天龍住持無一法又誰管伊可不可早是罪犯彌天過重丘嶽且道是甚麼過若向這裏見得分明方許規導來學小參道盡大地是個文殊普賢境界也是無端妄生節目喚十方萬物為自己更是倚草附木除卻二途切莫向鬼窟裏作活計直饒總不恁麼又是矢上加尖到者裏畢竟作麼生行履得恰好去豈不見南泉道老僧幼小牧得一頭水牯牛擬向溪東牧未免犯他國王水草擬向溪西牧亦未免犯他國王水草不如隨分納些些總不見得既然且道如何是隨分納些些底道理咦八十翁翁入場屋真誠不是小兒戲為天一和尚對靈小參一點雨一點濕個事見成明歷歷本無生滅與去來說甚涅槃與圓寂不屬南北與東西世出世間無彼此既不屬南北東西又無彼又無此且道向甚麼處見得明歷歷不見道沒蹤跡處不藏身藏身處沒蹤跡還知我天一法兄和尚落處麼以拂子打圓相云天寬海闊難描邈無位真人赤骨律喝一喝除夕小參天原不動地本無移日月推遷周而復始一年三百六十日花甲翻來覆去從頭至尾數到今日臘月三十夜檢點將來只是個天干地支說甚麼四時八節二十四氣小盡二十九大盡三十日雖是道理分明未免於中取次拈起杖云惟有拄杖子古古怪怪列列挈挈不屬陰陽造化不逐日月遷流不隨四時更變單單要為諸人敲枷打鎖抽釘拔楔直下教汝鼻孔放光眼睛出氣末後又教頭頂青天腳踏實地果向者裏倜儻分明便是一生參學事畢其或未能莫只事逐眼前過須覺老從頭上來八院小參在在處處剎剎塵塵明明歷歷歷歷明明圓陀陀輝天鑑地光爍爍耀古騰今不是目前法亦非心外事且道是個甚麼即心即佛非心非佛不是心不是佛不是物喝一喝云徒勞妄生卜度釋迦老子離兜率降皇宮出母胎入雪山六年苦行夜睹明星豁然大悟只得奇哉三嘆依然滿口道不出達磨大師九年面壁落賺神光斷臂分皮分骨分髓不惟於此全沒交涉要且自賺一場懡㦬至於禾山打鼓雪峰輥毬溈山打木魚洞山麻三斤雲門乾屎橛趙州庭前柏樹子德山棒臨濟喝看來總是小兒伎到此一點也用不著何況升堂入室鼓舌搖唇朝參暮請東討西覓以為究竟正似取螢火燒須彌山驢年也未得著所以道向上一路千聖不傳學者勞形如狷捉影到者裏絶形名離朕兆沒蹤跡是汝諸人向甚麼處摸索松巋今晚入院之始別無供奉直得不惜眉毛不避諸方怪笑將來與諸人下個注腳還委悉麼良久擲拂子云道泰不傳天子令時清那唱太平歌荐慈對靈小參生亦未曾養死亦未曾葬罪犯彌天過有萬狀驀豎拂子云幸有拂子不拘世情小節不涉親疏背向堪報不報之恩用作無為之化所以二十年前曾為吾母商量己躬大事一向信行得力臨終自是正生脫化何必今日重翻宇宙作此伎倆將謂報劬勞而薦拔喝一喝云不惟徒設虛假看來也是錦上鋪花既然如此報恩一句則且置秪如吾母正生脫化向甚麼處安身立命大衆還委悉麼良久云生滅異緣皆幻住真性何嘗有去來除夕小參月頭是初一月尾是三十月月皆如是今晚道除夕即此問諸人諸人總不識即此問露柱露柱道猶是妄分析即此問燈籠燈籠笑嘻嘻且道他笑個甚麼笑諸人不識殊不知就此者不識處打翻漆桶直下便見古今天地古今日月古今星宿古今山河古今凡聖古今人物古今事理一切總在者裏不曾移易一絲毫頭許說甚麼時節遷變否去泰來總似夢中說夢直得澄澄湛湛了了明明無彼無此無前無後無古無今無來無去無生無滅無動無靜於中更求絲毫遷易差別間隔之相了不可得所以道無邊剎海自他不隔於毫端十世古今始終不離於當念既不離當念因甚當念不識還識者不識底消息麼良久曰好事不須頻話會留將和氣暖丹田九龍大衆請為法叔古源和尚對靈小參靈光獨耀萬古徽猷世出世間寂然不二在在處處剎剎塵塵法法頭頭無可不可無是不是其間欲覓纖毫生滅去來動靜出入有為之相了不可得更說甚麼還源復始達本歸根成佛證祖越死超生大似無夢說夢好肉剜瘡明眼人前一場笑具故我九龍法叔和尚數十年來行悲切令用老婆心搖三寸舌簸兩片皮橫說豎說雖是方便為人亦未免隨群逐隊幸爾今朝化緣已畢到此難瞞秪得改聲換調棄虛抵實將此者段大事因緣徹底掀翻普示諸人去也那待松巋鋪花錦上正恁麼時且道有甚憑據木人攜板雲中拍石女銜笙井底吹天龍大衆請為法叔古源和尚對靈小參寒暑陰晴天地德喜怒哀樂人間事一切明明本現成堪笑於中分道理甚麼道理我法叔天龍和尚圓寂大衆為設薦嚴佛事敦請松巋對靈小參一為報慈恩厚德一為舉向上宗乘必欲人人循遵孝道個個體證無生正恁麼時還是循遵孝道底是體證無生底是檢點將來總未免傍觀者哂且道哂個甚麼三級浪高魚化龍癡人猶戽夜塘水為天龍法叔和尚舉哀若論箇事欲速則不達久長則美細行則堅是我法叔和尚恁麼行履數十年來綿綿密密密密綿綿不曾移易一絲毫頭許所以門庭孤迥道越諸方依稀倣佛之流只得望巖而退湖海英俊衲子不遠千里來歸雍雍肅肅濟濟蹌蹌法舍弘規無所不備遽爾幻緣一脫遍界悲風凡聖驚憂人天失望故我見前一衆不勝悲思且道思個甚麼若教頻下淚滄海亦須乾焚換舊佛清淨法身原無更變換舊安新兩重公案甚麼公案新底裝嚴舊底火鍛然雖裝鍛不同彼此兩不相缺且作麼生是不缺底消息遂舉火云鯨吞海水盡露出珊瑚枝普陽信善張祖明杜寂富程寂修陳寂恩吳恆善羅淨依胡照本陳寂秀張朗修杜寂忍賴友輔張國相任玉琰杜朝勝程朝俊郭起學信善李恆勝謝祖鼻宋恆瑞田寂輝江祖滴田福慶羅自恆鄭應試胡寂聯張實行田萬畝鄭邦儒方良輔胡國恩陳恆善張寂容張善福賈傳張育張嘉爵魯德源王朝卿田應開谷明茂馮深戒宋寂榮胡國幹男恆福簡寂心同緣胡氏寂瓊趙文美同緣汪氏廣修武原陳子蘭書嘉興刊康熙癸未季秋穀旦板存嘉興楞嚴寺藏房
